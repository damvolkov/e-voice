services:
  evoice:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: evoice
    hostname: evoice
    restart: unless-stopped
    volumes:
      - ./data/config:/app/data/config
      - models:/app/data/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5500/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  gateway:
    image: nginx:alpine
    container_name: evoice-gateway
    hostname: gateway
    restart: unless-stopped
    ports:
      - "${PORT:-5500}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      evoice:
        condition: service_healthy

volumes:
  models:
    driver: local
