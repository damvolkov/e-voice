services:
  evoice:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: evoice
    hostname: evoice
    restart: unless-stopped
    ports:
      - "${PORT:-5500}:80"
    volumes:
      - ./data/config:/app/data/config
      - models:/app/data/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  models:
    driver: local
