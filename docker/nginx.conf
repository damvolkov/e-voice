upstream api {
    server evoice:5500;
}

upstream ui {
    server evoice:5600;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 100M;

    # API endpoints
    location /v1/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    location /health {
        proxy_pass http://api;
    }

    # WebSocket endpoints
    location /v1/audio/transcriptions {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location /v1/audio/speech {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Robyn OpenAPI docs
    location /docs {
        proxy_pass http://api;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://api;
    }

    # Everything else → Gradio UI
    location / {
        proxy_pass http://ui;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
    }
}
