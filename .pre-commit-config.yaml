repos:
  # Basic auto-fixes (zero friction)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict

  # Ruff: lint + format (single pass)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # Unit tests with coverage
  - repo: local
    hooks:
      - id: pytest-unit
        name: pytest unit tests
        entry: uv run pytest tests/unit -n auto -q --cov --cov-report=term-missing --cov-fail-under=90
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]

  # Semgrep and gitleaks security scanning
  - repo: https://github.com/returntocorp/semgrep
    rev: "v1.89.0"
    hooks:
      - id: semgrep
        args:
          [
            "--metrics=off",
            "--config",
            "p/owasp-top-ten",
            "--config",
            "p/cwe-top-25",
            "--config",
            "p/gitleaks",
            "--error",
            "--skip-unknown-extensions",
            "--exclude-rule=python.sqlalchemy.security.audit.avoid-sqlalchemy-text.avoid-sqlalchemy-text",
          ]
        stages: [pre-commit]

  # Dedicated secrets detection using Gitleaks (standalone security tool)
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
